<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This file contains the images/media for this HW assignment">
    <title>This is the media page for the Kitchen Sink HW</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Media Page</h1>
        <nav>
            <ul>
                <li><a href="deprecated.html">Deprecated</a></li>
                <li><a href="experiments.html">Experiments</a></li>
                <li><a href="forms.html">Forms</a></li>
                <li><a href="index.html">Index</a></li>
                <li><a href="structure.html">Structure</a></li>
                <li><a href="tables.html">Tables</a></li>
                <li><a href="text.html">Text</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <figure>
            <img src="assets/locks.jpg" alt="Padlocks around a shield" width="600" height="400">
            <figcaption>Padlocks around a shield</figcaption>
        </figure>
        <picture>
            <source media="(min-width: 800px)" srcset="assets/locks.jpg">
            <source media="(min-width: 400px)" srcset="assets/locks.jpg">
            <img src="assets/locks.jpg" alt="Padlocks around a shield" width="600" height="400">
        </picture>

        <audio controls loop muted>
            <source src="assets/audio.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <video controls poster="assets/locks.jpg" width="600">
            <source src="assets/sample.mp4" type="video/mp4">
            <track kind="captions" src="assets/captions.vtt" srclang="en" label="English">
            Your browser does not support the video element.
        </video>

        <iframe 
            src="https://www.youtube.com/embed/inWWhr5tnEA" 
            width="600" 
            height="400" 
            title="Cybersecurity Introduction Video"
            allowfullscreen>
        </iframe>

        <embed src="assets/cyberhands.jpg" type="image/jpeg" width="600" height="400">
        <object data="assets/cyberhands.jpg" type="image/jpeg" width="600" height="400">
            <param name="src" value="assets/cyberhands.jpg">
            <p>Your browser does not support this object. <a href="assets/cyberhands.jpg">Download the image</a> instead.</p>
        </object>

        <canvas id="myCanvas" width="200" height="200">
            Your browser does not support the canvas element.
        </canvas>
        <script>
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'red';
            ctx.fillRect(10, 10, 150, 150);
        </script>

        <svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="100" height="100" fill="blue"/>
            <circle cx="150" cy="150" r="40" fill="red"/>
        </svg>

        <img src="assets/locks.jpg" alt="Padlocks" usemap="#lockmap" width="600" height="400">
        <map name="lockmap">
            <area shape="rect" coords="0,0,300,400" href="index.html" alt="Left side">
            <area shape="rect" coords="300,0,600,400" href="text.html" alt="Right side">
        </map>
    </main>
    <footer>
        <p>&copy; 2026 William Blanco. All rights reserved.</p>
    </footer>
</body>
</html>
